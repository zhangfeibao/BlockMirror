<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>性能[算法]调试器</title>

    <script src="../lib/jquery/jquery-3.4.1.slim.min.js" type="text/javascript"></script>

    <!-- Blockly -->
    <script src="../node_modules/blockly/blockly_compressed.js" type="text/javascript"></script>
    <script src="../node_modules/blockly/blocks_compressed.js" type="text/javascript"></script>
    <script src="../node_modules/blockly/msg/en.js" type="text/javascript"></script>
    <script src="../node_modules/blockly/python_compressed.js" type="text/javascript"></script>
    <script src="../node_modules/@blockly/field-multilineinput/dist/index.js" type="text/javascript"></script>

    <!-- CodeMirror -->
    <link rel="stylesheet" href="../lib/codemirror/codemirror.css">
    <link rel="stylesheet" href="../lib/codemirror/fullscreen.css">
    <link rel="stylesheet" href="../lib/codemirror/show-hint.css">
    <script src="../lib/codemirror/codemirror.js" type="text/javascript"></script>
    <script src="../lib/codemirror/show-hint.js" type="text/javascript"></script>
    <script src="../lib/codemirror/python-hint.js" type="text/javascript"></script>
    <script src="../lib/codemirror/fullscreen.js" type="text/javascript"></script>
    <script src="../lib/codemirror/python.js" type="text/javascript"></script>

    <!-- Skulpt Parser -->
    <script src="../dist/skulpt_parser.js" type="text/javascript"></script>

    <!-- BlockMirror -->
    <link rel="stylesheet" href="../dist/block_mirror.css">
    <script src="../dist/block_mirror.js" type="text/javascript"></script>

    <!-- xterm.js -->
    <link rel="stylesheet" href="../node_modules/@xterm/xterm/css/xterm.css">
    <script src="../node_modules/@xterm/xterm/lib/xterm.js"></script>
    <script src="../node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>

    <!-- Marked.js for Markdown rendering -->
    <script src="../lib/marked.min.js" type="text/javascript"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0d1117;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            color: #e6edf3;
        }

        /* Dark scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0d1117; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #484f58; }

        #toolbar {
            display: flex;
            align-items: center;
            padding: 8px 16px;
            background: linear-gradient(180deg, #161b22 0%, #0d1117 100%);
            border-bottom: 1px solid #30363d;
            box-shadow: 0 1px 4px rgba(0,0,0,0.3), 0 0 1px rgba(88,166,255,0.3);
            flex-shrink: 0;
            gap: 12px;
        }

        #toolbar-title {
            font-size: 14px;
            font-weight: 600;
            color: #e6edf3;
            letter-spacing: 0.01em;
        }

        #mode-switcher {
            display: flex;
            background: #21262d;
            border-radius: 8px;
            padding: 3px;
            gap: 2px;
        }

        .mode-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 14px;
            border: none;
            border-radius: 6px;
            background: transparent;
            color: #8b949e;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s, color 0.15s, box-shadow 0.15s;
            white-space: nowrap;
            font-family: inherit;
        }

        .mode-btn:hover {
            background: #30363d;
            color: #e6edf3;
        }

        .mode-btn.active {
            background: #1f6feb;
            color: #ffffff;
            box-shadow: 0 0 8px rgba(88,166,255,0.3);
        }

        .mode-btn svg {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
        }

        /* 运行按钮 */
        #run-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 16px;
            background: #238636;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
            font-family: inherit;
            margin-left: auto;
        }

        #run-btn:hover { background: #2ea043; }
        #run-btn.running { background: #da3633; }
        #run-btn.running:hover { background: #f85149; }

        #run-btn svg {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
        }

        /* editor-wrapper 改为纵向 flex */
        #editor-wrapper {
            flex: 1;
            min-height: 0;
            min-width: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #blockmirror-editor {
            width: 100%;
            flex: 1;
            min-height: 0;
            overflow: hidden;
            position: relative;
        }

        /* 可拖拽分隔条 */
        #resize-handle {
            width: 100%;
            height: 6px;
            background: #30363d;
            cursor: ns-resize;
            flex-shrink: 0;
            transition: background 0.1s;
            position: relative;
        }

        #resize-handle:hover,
        #resize-handle.dragging { background: #58a6ff; }

        #resize-handle::before {
            content: '';
            position: absolute;
            top: -4px;
            left: 0;
            width: 100%;
            height: 14px;
        }

        /* 终端面板 */
        #terminal-panel {
            width: 100%;
            height: 280px;
            min-height: 60px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            background: #1e1e1e;
        }

        #terminal-panel.hidden {
            height: 0 !important;
            overflow: hidden;
        }

        /* 终端标题栏 */
        #terminal-header {
            display: flex;
            align-items: center;
            padding: 4px 12px;
            background: #2d2d2d;
            border-top: 1px solid #444;
            gap: 8px;
            flex-shrink: 0;
        }

        #terminal-title { font-size: 12px; color: #9ca3af; font-weight: 500; flex: 1; }
        #terminal-status { font-size: 11px; color: #6b7280; }

        .terminal-btn {
            background: none;
            border: none;
            color: #6b7280;
            cursor: pointer;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-family: inherit;
        }

        .terminal-btn:hover { background: #374151; color: #d1d5db; }

        /* xterm 挂载容器 */
        #xterm-container { flex: 1; overflow: hidden; padding: 4px; }
        .xterm { height: 100%; }
        .xterm-viewport { overflow-y: auto !important; }

        /* 文件操作按钮 */
        .toolbar-icon-btn {
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            border-radius: 6px;
            color: #8b949e;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            padding: 0;
        }

        .toolbar-icon-btn:hover {
            background: #30363d;
            color: #e6edf3;
        }

        .toolbar-icon-btn svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        #file-actions {
            display: none;
            align-items: center;
            gap: 2px;
            padding-right: 12px;
            margin-right: 0;
            border-right: 1px solid #30363d;
        }

        #blockfactory-btn,
        #module-manager-btn,
        #vscode-btn {
            display: none;
            align-items: center;
            gap: 6px;
            padding: 5px 10px;
            border: 1px solid #30363d;
            border-radius: 6px;
            background: transparent;
            color: #8b949e;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
            white-space: nowrap;
            font-family: inherit;
        }

        #blockfactory-btn:hover,
        #module-manager-btn:hover,
        #vscode-btn:hover {
            background: #30363d;
            color: #e6edf3;
            border-color: #484f58;
        }

        #blockfactory-btn svg,
        #module-manager-btn svg,
        #vscode-btn svg {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
        }

        #file-name {
            display: none;
            font-size: 12px;
            color: #8b949e;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* AI 助手按钮 */
        #ai-chat-btn {
            display: none;
            align-items: center;
            gap: 6px;
            padding: 5px 10px;
            border: 1px solid #30363d;
            border-radius: 6px;
            background: transparent;
            color: #8b949e;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
            white-space: nowrap;
            font-family: inherit;
        }
        #ai-chat-btn:hover { background: #30363d; color: #e6edf3; border-color: #484f58; }
        #ai-chat-btn.active { background: rgba(31,111,235,0.2); color: #58a6ff; border-color: #1f6feb; }
        #ai-chat-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

        /* 主内容区 flex 行 */
        #main-content {
            display: flex;
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }

        /* AI 聊天面板 */
        #ai-chat-panel {
            width: 400px;
            min-width: 320px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            background: #1e1e2e;
            border-left: 1px solid #333;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        #ai-chat-panel.hidden { display: none; }

        #ai-chat-header {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            background: #2d2d3d;
            border-bottom: 1px solid #444;
            gap: 8px;
            flex-shrink: 0;
        }
        #ai-chat-header select {
            background: #3d3d4d;
            color: #d4d4d4;
            border: 1px solid #555;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 12px;
            font-family: inherit;
            cursor: pointer;
        }
        .ai-header-btn {
            background: none;
            border: 1px solid #555;
            color: #9ca3af;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-family: inherit;
            white-space: nowrap;
            transition: background 0.15s, color 0.15s;
        }
        .ai-header-btn:hover { background: #3d3d4d; color: #d1d5db; }
        #ai-header-spacer { flex: 1; }

        /* 对话列表下拉 */
        #ai-conv-dropdown {
            position: relative;
        }
        #ai-conv-btn {
            background: none;
            border: 1px solid #555;
            color: #9ca3af;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-family: inherit;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        #ai-conv-btn:hover { background: #3d3d4d; color: #d1d5db; }
        #ai-conv-list {
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 4px;
            background: #2d2d3d;
            border: 1px solid #555;
            border-radius: 6px;
            min-width: 240px;
            max-height: 300px;
            overflow-y: auto;
            z-index: 100;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        #ai-conv-list.open { display: block; }
        .ai-conv-item {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 12px;
            color: #d4d4d4;
            border-bottom: 1px solid #3d3d4d;
            gap: 8px;
        }
        .ai-conv-item:hover { background: #3d3d4d; }
        .ai-conv-item.active { background: #3d3d5d; color: #93c5fd; }
        .ai-conv-item-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .ai-conv-item-delete {
            color: #6b7280;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            padding: 0 4px;
            line-height: 1;
        }
        .ai-conv-item-delete:hover { color: #ef4444; }
        .ai-conv-item-time {
            font-size: 10px;
            color: #6b7280;
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* 消息区 */
        #ai-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        #ai-messages::-webkit-scrollbar { width: 6px; }
        #ai-messages::-webkit-scrollbar-track { background: transparent; }
        #ai-messages::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }

        .ai-msg {
            max-width: 95%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 13px;
            line-height: 1.6;
            word-wrap: break-word;
            white-space: pre-wrap;
        }
        .ai-msg.user {
            align-self: flex-end;
            background: #2563eb;
            color: #ffffff;
            border-bottom-right-radius: 4px;
        }
        .ai-msg.assistant {
            align-self: flex-start;
            background: #2d2d3d;
            color: #d4d4d4;
            border-bottom-left-radius: 4px;
        }
        .ai-msg.error {
            align-self: center;
            background: #451a1a;
            color: #f87171;
            font-size: 12px;
        }
        .ai-msg.loading {
            align-self: flex-start;
            background: #2d2d3d;
            color: #9ca3af;
            font-style: italic;
        }

        /* 代码块 */
        .ai-code-block {
            position: relative;
            margin: 8px 0;
            background: #1a1a2a;
            border: 1px solid #444;
            border-radius: 6px;
            overflow: hidden;
        }
        .ai-code-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 10px;
            background: #252535;
            font-size: 11px;
            color: #888;
        }
        .ai-code-apply-btn {
            background: #16a34a;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 2px 10px;
            font-size: 11px;
            cursor: pointer;
            font-family: inherit;
        }
        .ai-code-apply-btn:hover { background: #15803d; }
        .ai-code-copy-btn {
            background: #3d3d4d;
            color: #d4d4d4;
            border: none;
            border-radius: 4px;
            padding: 2px 10px;
            font-size: 11px;
            cursor: pointer;
            font-family: inherit;
            margin-right: 4px;
        }
        .ai-code-copy-btn:hover { background: #4d4d5d; }
        .ai-code-content {
            padding: 10px 12px;
            font-family: Consolas, 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.5;
            color: #d4d4d4;
            overflow-x: auto;
            white-space: pre;
        }

        /* 输入区 */
        #ai-input-area {
            display: flex;
            flex-direction: column;
            padding: 10px 12px;
            background: #2d2d3d;
            border-top: 1px solid #444;
            gap: 8px;
            flex-shrink: 0;
        }
        #ai-input {
            width: 100%;
            background: #1e1e2e;
            color: #d4d4d4;
            border: 1px solid #555;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 13px;
            font-family: inherit;
            resize: vertical;
            min-height: 80px;
            max-height: 200px;
            line-height: 1.5;
        }
        #ai-input:focus { outline: none; border-color: #2563eb; }
        #ai-input::placeholder { color: #6b7280; }
        #ai-input-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #ai-send-btn {
            margin-left: auto;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            white-space: nowrap;
        }
        #ai-send-btn:hover { background: #1d4ed8; }
        #ai-send-btn:disabled { background: #4b5563; cursor: not-allowed; }

        /* API 文档按钮 */
        #ai-api-doc-btn {
            display: flex;
            align-items: center;
            gap: 4px;
            background: none;
            border: 1px solid #555;
            color: #9ca3af;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-family: inherit;
            white-space: nowrap;
            transition: background 0.15s, color 0.15s;
        }
        #ai-api-doc-btn:hover { background: #3d3d4d; color: #d1d5db; }
        #ai-api-doc-btn.loaded { border-color: #16a34a; color: #4ade80; }
        #ai-api-doc-btn svg { width: 12px; height: 12px; flex-shrink: 0; }
        #ai-api-doc-name {
            font-size: 11px;
            color: #6b7280;
            max-width: 140px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        #ai-api-doc-clear {
            background: none;
            border: none;
            color: #6b7280;
            cursor: pointer;
            font-size: 13px;
            padding: 0 2px;
            line-height: 1;
        }
        #ai-api-doc-clear:hover { color: #ef4444; }

        /* 设置对话框 */
        #ai-settings-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        #ai-settings-overlay.open { display: flex; }
        #ai-settings-dialog {
            background: #2d2d3d;
            border-radius: 12px;
            padding: 24px;
            width: 480px;
            max-height: 80vh;
            overflow-y: auto;
            color: #d4d4d4;
            box-shadow: 0 16px 48px rgba(0,0,0,0.5);
        }
        #ai-settings-dialog h3 {
            margin: 0 0 16px;
            font-size: 16px;
            color: #f0f0f0;
        }
        .ai-settings-field {
            margin-bottom: 14px;
        }
        .ai-settings-field label {
            display: block;
            font-size: 12px;
            color: #9ca3af;
            margin-bottom: 4px;
        }
        .ai-settings-field input,
        .ai-settings-field select,
        .ai-settings-field textarea {
            width: 100%;
            background: #1e1e2e;
            color: #d4d4d4;
            border: 1px solid #555;
            border-radius: 6px;
            padding: 8px 10px;
            font-size: 13px;
            font-family: inherit;
        }
        .ai-settings-field textarea { min-height: 100px; resize: vertical; }
        .ai-settings-field input:focus,
        .ai-settings-field select:focus,
        .ai-settings-field textarea:focus { outline: none; border-color: #2563eb; }
        .ai-settings-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 16px;
        }
        .ai-settings-actions button {
            padding: 8px 20px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            font-family: inherit;
            border: none;
        }
        .ai-settings-cancel { background: #3d3d4d; color: #d4d4d4; }
        .ai-settings-cancel:hover { background: #4d4d5d; }
        .ai-settings-save { background: #2563eb; color: white; }
        .ai-settings-save:hover { background: #1d4ed8; }

        /* ── Status Bar ── */
        #status-bar {
            display: none;
            align-items: center;
            padding: 0 12px;
            height: 24px;
            background: #161b22;
            border-top: 1px solid #30363d;
            flex-shrink: 0;
            font-size: 11px;
            color: #8b949e;
            gap: 12px;
            font-family: inherit;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #6e7681;
            flex-shrink: 0;
        }
        .status-dot.connected { background: #22c55e; }
        .status-text { white-space: nowrap; }
        .status-sep { color: #30363d; }
        .status-info { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* ── ramgs toolbar buttons ── */
        #ramgs-toolbar {
            display: none;
            align-items: center;
            gap: 2px;
            margin-left: 4px;
        }
        .ramgs-tool-btn {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 5px 8px;
            border: 1px solid #30363d;
            border-radius: 6px;
            background: transparent;
            color: #8b949e;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
            white-space: nowrap;
            font-family: inherit;
        }
        .ramgs-tool-btn:hover {
            background: #30363d;
            color: #e6edf3;
            border-color: #484f58;
        }
        .ramgs-tool-btn svg { width: 13px; height: 13px; flex-shrink: 0; }

        /* ── ramgs dialog overlays ── */
        .ramgs-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .ramgs-overlay.open { display: flex; }
        .ramgs-dialog {
            background: #1c2128;
            border-radius: 12px;
            padding: 24px;
            width: 460px;
            max-height: 80vh;
            overflow-y: auto;
            color: #e6edf3;
            box-shadow: 0 16px 48px rgba(0,0,0,0.5), 0 0 30px rgba(88,166,255,0.08);
        }
        .ramgs-dialog h3 {
            margin: 0 0 16px;
            font-size: 16px;
            font-weight: 600;
            color: #e6edf3;
        }
        .ramgs-field {
            margin-bottom: 14px;
        }
        .ramgs-field label {
            display: block;

<script>
    // ── BlockMirror 初始化 ──
    var editor = new BlockMirror({
        'blocklyMediaPath': '../node_modules/blockly/media',
        'container': document.getElementById('blockmirror-editor'),
    });

    // blockContainer 加 overflow:hidden，防止 Blockly toolbox/scrollbar 在裁剪前露出
    editor.tags.blockContainer.style.overflow = 'hidden';

    // 同步 BlockMirror 内部高度到容器实际可用高度
    // block_editor.js / text_editor.js 的 resizeResponsively() 均依赖
    // editor.configuration.height 来设置 blockContainer/blockArea/textContainer 的像素高度；
    // 若该值与容器实际高度不一致，Blockly toolbox 和 scrollbar 会溢出覆盖终端面板。
    function syncEditorHeight() {
        var h = document.getElementById('blockmirror-editor').offsetHeight;
        if (h > 0) {
            editor.configuration.height = h;
        }
        // textEditor.resizeResponsively() 更新 textContainer 高度（editor.refresh 不会调它）
        editor.textEditor.resizeResponsively();
        editor.refresh();
    }

    function setMode(mode) {
        editor.setMode(mode);
        document.querySelectorAll('.mode-btn').forEach(function(btn) {
            btn.classList.toggle('active', btn.dataset.mode === mode);
        });
    }

    // ── 终端状态 ──
    var term = null;
    var fitAddon = null;
    var isRunning = false;

    // ── 终端初始化 ──
    function initTerminal() {
        if (!window.electronAPI) {
            document.getElementById('terminal-panel').innerHTML =
                '<div style="padding:12px;color:#888;font-size:12px;">终端仅在 Electron 中可用</div>';
            return;
        }

        term = new Terminal({
            fontFamily: 'Consolas, "Courier New", monospace',
            fontSize: 13,
            lineHeight: 1.4,
            theme: {
                background: '#1e1e1e',
                foreground: '#d4d4d4',
                cursor: '#d4d4d4',
                selectionBackground: '#264f78',
            },
            scrollback: 5000,
            convertEol: true,
            cursorBlink: true,
        });
        fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);
        term.open(document.getElementById('xterm-container'));
        fitAddon.fit();

        // 本地行缓冲 + 回显
        // spawn 无 PTY，Shell 不会回显输入、不会响应逐字节写入；
        // 需在 xterm.js 侧做本地回显，按 Enter 后再整行发给 Shell。
        var shellInputBuffer = '';
        term.onData(function(data) {
            if (data === '\r') {
                // Enter：回显换行，整行发给 Shell
                term.write('\r\n');
                window.electronAPI.writeToShell(shellInputBuffer + '\n');
                shellInputBuffer = '';
            } else if (data === '\x7f' || data === '\b') {
                // Backspace：删除缓冲末字符并更新显示
                if (shellInputBuffer.length > 0) {
                    shellInputBuffer = shellInputBuffer.slice(0, -1);
                    term.write('\b \b');
                }
            } else if (data === '\x03') {
                // Ctrl+C：转发中断信号
                window.electronAPI.writeToShell('\x03');
                term.write('^C\r\n');
                shellInputBuffer = '';
            } else if (data.charCodeAt(0) >= 32) {
                // 可打印字符：本地回显并加入缓冲
                shellInputBuffer += data;
                term.write(data);
            }
        });

        // 主进程输出 → 终端显示
        window.electronAPI.onOutput(function(data) { term.write(data); });

        // 进程退出处理
        window.electronAPI.onProcessExit(function(info) {
            if (info.source === 'python') {
                setRunningState(false);
                var msg = info.exitCode === 0
                    ? '\x1b[32m\r\n─── 执行完成（退出码: 0）───\x1b[0m\r\n'
                    : '\x1b[31m\r\n─── 执行失败（退出码: ' + info.exitCode + '）───\x1b[0m\r\n';
                term.write(msg);
            }
        });

        term.write('\x1b[32mBlockMirror 终端就绪\x1b[0m\r\n');
        term.write('点击"运行"按钮执行 Python 代码，或在此直接输入 shell 命令\r\n\r\n');

        // 启动持久 Shell
        window.electronAPI.startShell();
        initResizeHandle();
    }

    // ── 运行按钮状态 ──
    function setRunningState(running) {
        isRunning = running;
        var btn = document.getElementById('run-btn');
        var icon = document.getElementById('run-icon');
        var label = document.getElementById('run-label');
        if (running) {
            btn.classList.add('running');
            label.textContent = '停止';
            icon.innerHTML = '<rect x="4" y="4" width="8" height="8"/>';
        } else {
            btn.classList.remove('running');
            label.textContent = '运行';
            icon.innerHTML = '<polygon points="4,2 14,8 4,14"/>';
        }
    }

    function handleRunClick() {
        if (!window.electronAPI) { alert('Python 执行仅在 Electron 中可用'); return; }
        if (isRunning) {
            window.electronAPI.killPython();
            setRunningState(false);
            return;
        }

        var code = editor.getCode();
        if (!code || !code.trim()) {
            if (term) term.write('\x1b[33m[提示] 编辑器中无代码\x1b[0m\r\n');
            return;
        }

        // 保存后再运行：未保存过的文件弹出保存对话框，已保存过的自动保存
        doSave().then(function(saved) {
            if (!saved) return; // 用户取消了保存对话框
            showTerminal();
            setRunningState(true);
            if (term) term.write('\x1b[90m─── 开始执行 Python 脚本 ───\x1b[0m\r\n');

            window.electronAPI.runPython(fileState.currentPath).catch(function(err) {

    }

    function markClean() {
        fileState.isDirty = false;
        fileState.initialCode = editor.getCode();
        updateWindowTitle();
    }

    editor.addChangeListener(function() {
        var currentCode = editor.getCode();

    // ── 文件操作函数 ──
    function confirmSaveIfDirty() {
        if (!fileState.isDirty) return Promise.resolve('discard');
        if (!window.electronAPI) return Promise.resolve('discard');
        return window.electronAPI.fileConfirmSave().then(function(result) {
            if (result.response === 0) return 'save';
            if (result.response === 1) return 'discard';
            return 'cancel';
        });
    }

    function doSave() {
        var code = editor.getCode();
        if (fileState.currentPath) {
            return window.electronAPI.fileSave({ filePath: fileState.currentPath, content: code }).then(function() {
                markClean();
                return true;
            });
        } else {
            return window.electronAPI.fileSaveAs({ content: code }).then(function(result) {
                if (result.canceled) return false;
                fileState.currentPath = result.filePath;
                markClean();
                return true;
            });
        }
    }

    function fileNew() {
        confirmSaveIfDirty().then(function(action) {
            if (action === 'cancel') return;
            if (action === 'save') {
                return doSave().then(function(saved) {
                    if (saved) resetEditor();
                });
            }
            resetEditor();
        });
    }

    function resetEditor() {
        editor.setCode('');
        fileState.currentPath = null;

    function fileOpen() {

            if (action === 'cancel') return;

                });
            }
            doOpen();

    function doOpen() {
        window.electronAPI.fileOpen().then(function(result) {
            if (result.canceled) return;

            fileState.isDirty = false;
            fileState.initialCode = result.content;
            updateWindowTitle();

    var loadedCustomFunctions = {};
    var loadedCustomModuleKeys = {};
    var loadedCustomModuleImports = {};

    function loadCustomModules(data) {
        unloadCustomModules();
        var modules = data.modules || data;
        if (!Array.isArray(modules)) return;
        modules.forEach(function(mod) {
            if (!mod.functions) return;
            mod.functions.forEach(function(fn) {
                var signature = {
                    returns: fn.returns,
                    colour: fn.colour || mod.colour
                };
                if (fn.displayName) signature.message = fn.displayName;
                if (fn.params && fn.params.length > 0) signature.simple = fn.params;
                if (fn.fullParams && fn.fullParams.length > 0) signature.full = fn.fullParams;

                if (fn.module) {
                    // 模块函数：注册到 MODULE_FUNCTION_SIGNATURES
                    if (!BlockMirrorTextToBlocks.prototype.MODULE_FUNCTION_SIGNATURES[fn.module]) {
                        BlockMirrorTextToBlocks.prototype.MODULE_FUNCTION_SIGNATURES[fn.module] = {};
                    }
                    BlockMirrorTextToBlocks.prototype.MODULE_FUNCTION_SIGNATURES[fn.module][fn.name] = signature;
                    if (!loadedCustomModuleKeys[fn.module]) loadedCustomModuleKeys[fn.module] = [];
                    loadedCustomModuleKeys[fn.module].push(fn.name);
                    // 注册自动导入（仅当该模块前缀尚无内置 import 时）
                    if (!loadedCustomModuleImports[fn.module] &&
                        !BlockMirrorTextToBlocks.prototype.MODULE_FUNCTION_IMPORTS[fn.module]) {
                        BlockMirrorTextToBlocks.prototype.MODULE_FUNCTION_IMPORTS[fn.module] = 'import ' + fn.module;
                        loadedCustomModuleImports[fn.module] = true;
                    }
                } else {
                    // 全局函数：注册到 FUNCTION_SIGNATURES
                    BlockMirrorTextToBlocks.prototype.FUNCTION_SIGNATURES[fn.name] = signature;
                    loadedCustomFunctions[fn.name] = true;
                }
            });
        });

        // 生成 EXTRA_TOOLS 工具栏 XML
        modules.forEach(function(mod) {
            if (!mod.functions || mod.functions.length === 0) return;
            var xml = '<category name="' + escapeXml(mod.name) + '" colour="' + mod.colour + '">';
            mod.functions.forEach(function(fn) {
                xml += BlockMirrorTextToBlocks.getFunctionBlock(fn.name, {}, fn.module || undefined);
            });
            xml += '</category>';
            BlockMirrorBlockEditor.EXTRA_TOOLS['custom_' + mod.id] = xml;
        });

        editor.blockEditor.remakeToolbox();
        editor.forceBlockRefresh();
    }

    function unloadCustomModules() {
        for (var name in loadedCustomFunctions) {
            delete BlockMirrorTextToBlocks.prototype.FUNCTION_SIGNATURES[name];
        }
        loadedCustomFunctions = {};
        for (var mod in loadedCustomModuleKeys) {
            loadedCustomModuleKeys[mod].forEach(function(fn) {
                if (BlockMirrorTextToBlocks.prototype.MODULE_FUNCTION_SIGNATURES[mod]) {
                    delete BlockMirrorTextToBlocks.prototype.MODULE_FUNCTION_SIGNATURES[mod][fn];
                }
            });
        }
        loadedCustomModuleKeys = {};
        for (var imp in loadedCustomModuleImports) {
            delete BlockMirrorTextToBlocks.prototype.MODULE_FUNCTION_IMPORTS[imp];
        }
        loadedCustomModuleImports = {};
        for (var key in BlockMirrorBlockEditor.EXTRA_TOOLS) {
            if (key.indexOf('custom_') === 0) delete BlockMirrorBlockEditor.EXTRA_TOOLS[key];
        }
    }

    function escapeXml(s) {
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function renderConvList() {
        var listEl = document.getElementById('ai-conv-list');
        var btnEl = document.getElementById('ai-conv-btn');
        listEl.innerHTML = '';

        if (aiState.conversations.length === 0) {
            listEl.innerHTML = '<div style="padding:12px;color:#6b7280;font-size:12px;">No conversations</div>';
            btnEl.textContent = 'New Chat';
            return;
        }

        // Update button text to current conversation title
        var current = aiState.conversations.find(function(c) { return c.id === aiState.currentConversationId; });
        btnEl.textContent = current ? current.title : 'New Chat';

        aiState.conversations.forEach(function(conv) {
            var item = document.createElement('div');
            item.className = 'ai-conv-item' + (conv.id === aiState.currentConversationId ? ' active' : '');
            var timeStr = '';
            if (conv.createdAt) {
                var d = new Date(conv.createdAt);
                timeStr = (d.getMonth()+1) + '/' + d.getDate() + ' ' +
                    String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
            }
            item.innerHTML =
                '<span class="ai-conv-item-title">' + escapeHtml(conv.title) + '</span>' +
                '<span class="ai-conv-item-time">' + timeStr + '</span>' +
                '<button class="ai-conv-item-delete" title="Delete" data-id="' + conv.id + '">x</button>';
            item.addEventListener('click', function(e) {
                if (e.target.classList.contains('ai-conv-item-delete')) {
                    e.stopPropagation();
                    aiDeleteConversation(e.target.dataset.id);
                    return;
                }
                switchConversation(conv.id);
                toggleConvList();
            });
            listEl.appendChild(item);
        });

    // ── 消息发送 ──
    function sendAiMessage() {
        if (aiState.isSending) return;
        var inputEl = document.getElementById('ai-input');
        var text = inputEl.value.trim();
        if (!text) return;

        if (!window.electronAPI || !window.electronAPI.aiSendMessage) {
            alert('AI features are only available in Electron.');
            return;
        }

        if (!aiState.currentConversationId) {
            // Silently create a conversation, then retry send
            window.electronAPI.aiCreateConversation().then(function(conv) {
                aiState.currentConversationId = conv.id;
                refreshConversationList();
                sendAiMessage();
            });
            return;
        }

        inputEl.value = '';
        aiState.isSending = true;
        updateSendButton();

        // Display user message
        appendRenderedMessage('user', text);
        scrollMessagesToBottom();

        // Show loading indicator
        var loadingEl = document.createElement('div');
        loadingEl.className = 'ai-msg loading';
        loadingEl.textContent = 'Thinking...';
        document.getElementById('ai-messages').appendChild(loadingEl);
        scrollMessagesToBottom();

        // Attach current editor code and API doc as context
        var editorCode = editor.getCode() || '';
        var apiDoc = aiState.apiDocContent || '';

        window.electronAPI.aiSendMessage(aiState.currentConversationId, text, editorCode, apiDoc).then(function(result) {
            // Remove loading indicator
            if (loadingEl.parentNode) loadingEl.parentNode.removeChild(loadingEl);

            if (result.error) {
                appendRenderedMessage('error', result.error);
            } else if (result.content) {
                appendRenderedMessage('assistant', result.content);
            }

            aiState.isSending = false;
            updateSendButton();
            scrollMessagesToBottom();
            refreshConversationList(); // Title may have been auto-updated
        }).catch(function(err) {
            if (loadingEl.parentNode) loadingEl.parentNode.removeChild(loadingEl);
            appendRenderedMessage('error', err.message || String(err));
            aiState.isSending = false;
            updateSendButton();
        });
    }

    // ── 消息渲染 ──
    function appendRenderedMessage(role, content) {
        var messagesEl = document.getElementById('ai-messages');
        var msgEl = document.createElement('div');
        msgEl.className = 'ai-msg ' + role;

        if (role === 'user' || role === 'error') {
            msgEl.textContent = content;
        } else {
            // Assistant: render with code blocks
            msgEl.innerHTML = renderAssistantContent(content);
        }

        messagesEl.appendChild(msgEl);
    }

    function renderAssistantContent(content) {
        // Split by code blocks: ```language\ncode\n```
        var codeBlockRegex = /```(\w*)\n([\s\S]*?)```/g;
        var parts = [];
        var lastIndex = 0;
        var match;

        while ((match = codeBlockRegex.exec(content)) !== null) {
            // Text before code block
            if (match.index > lastIndex) {
                parts.push({ type: 'text', content: content.substring(lastIndex, match.index) });
            }
            parts.push({ type: 'code', lang: match[1] || '', content: match[2] });
            lastIndex = match.index + match[0].length;
        }
        // Remaining text
        if (lastIndex < content.length) {
            parts.push({ type: 'text', content: content.substring(lastIndex) });
        }

        var html = '';
        parts.forEach(function(part, idx) {
            if (part.type === 'text') {
                html += '<span>' + escapeHtml(part.content) + '</span>';
            } else {
                var isPython = part.lang.toLowerCase() === 'python' || part.lang === 'py' || part.lang === '';
                var codeId = 'ai-code-' + Date.now() + '-' + idx;
                html += '<div class="ai-code-block">';
                html += '<div class="ai-code-header">';
                html += '<span>' + (part.lang || 'code') + '</span>';
                html += '<span>';
                html += '<button class="ai-code-copy-btn" onclick="aiCopyCode(\'' + codeId + '\')">Copy</button>';
                if (isPython) {
                    html += '<button class="ai-code-apply-btn" onclick="applyCodeToEditor(\'' + codeId + '\')">Apply to Editor</button>';
                }
                html += '</span>';
                html += '</div>';
                html += '<div class="ai-code-content" id="' + codeId + '">' + escapeHtml(part.content) + '</div>';
                html += '</div>';
            }
        });

        return html || escapeHtml(content);
    }

    function escapeHtml(s) {
        var div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML;
    }

    function applyCodeToEditor(codeId) {
        var codeEl = document.getElementById(codeId);
        if (!codeEl) return;
        var code = codeEl.textContent;
        // Remove trailing whitespace but keep structure
        code = code.replace(/\s+$/, '');
        editor.setCode(code);
    }

    function aiCopyCode(codeId) {
        var codeEl = document.getElementById(codeId);
        if (!codeEl) return;
        var code = codeEl.textContent;
        if (navigator.clipboard) {
            navigator.clipboard.writeText(code);
        }
    }

    // ── AI 设置 ──
    function showAiSettings() {
        if (!window.electronAPI) return;
        window.electronAPI.aiGetSettings().then(function(settings) {
            document.getElementById('ai-set-token').value = settings.authToken || '';
            document.getElementById('ai-set-user').value = settings.aigcUser || '';
            document.getElementById('ai-set-model').value = settings.model || 'gpt-5';
            document.getElementById('ai-set-effort').value = settings.effort || 'medium';
            document.getElementById('ai-set-prompt').value = settings.systemPrompt || '';
            document.getElementById('ai-settings-overlay').classList.add('open');
        });
    }

    function closeAiSettings() {
        document.getElementById('ai-settings-overlay').classList.remove('open');
    }

    function closeAiSettingsOverlay(e) {
        if (e.target === document.getElementById('ai-settings-overlay')) {
            closeAiSettings();
        }
    }

    function saveAiSettings() {
        if (!window.electronAPI) return;
        var data = {
            authToken: document.getElementById('ai-set-token').value,
            aigcUser: document.getElementById('ai-set-user').value,
            model: document.getElementById('ai-set-model').value,
            effort: document.getElementById('ai-set-effort').value,
            systemPrompt: document.getElementById('ai-set-prompt').value,
        };
        window.electronAPI.aiSaveSettings(data).then(function() {
            document.getElementById('ai-model-select').value = data.model;
            closeAiSettings();
        });
    }

    // ── API 文档管理 ──
    function selectApiDoc() {
        if (!window.electronAPI || !window.electronAPI.aiSelectApiDoc) {
            alert('This feature is only available in Electron.');
            return;
        }
        window.electronAPI.aiSelectApiDoc().then(function(result) {
            if (result.canceled) return;
            aiState.apiDocContent = result.content;
            aiState.apiDocFileName = result.fileName;
            updateApiDocUI();
        });
    }

    function clearApiDoc() {
        aiState.apiDocContent = '';
        aiState.apiDocFileName = '';
        updateApiDocUI();
    }

    function updateApiDocUI() {
        var btn = document.getElementById('ai-api-doc-btn');
        var nameEl = document.getElementById('ai-api-doc-name');
        var clearBtn = document.getElementById('ai-api-doc-clear');
        if (aiState.apiDocFileName) {
            btn.classList.add('loaded');
            nameEl.textContent = aiState.apiDocFileName;
            nameEl.title = aiState.apiDocFileName;
            clearBtn.style.display = 'inline';
        } else {
            btn.classList.remove('loaded');
            nameEl.textContent = '';
            nameEl.title = '';
            clearBtn.style.display = 'none';
        }
    }

    // ══════════════════════════════════════════════════
    // RAMViewer (ramgs) Tool Integration
    // ══════════════════════════════════════════════════

    function refreshRamgsStatus() {
        if (!window.electronAPI || !window.electronAPI.ramgsStatus) return;
        window.electronAPI.ramgsStatus().then(function(status) {
            var dot = document.getElementById('status-dot');
            var text = document.getElementById('status-text');
            var portEl = document.getElementById('status-port');
            var baudEl = document.getElementById('status-baud');
            var symbolsEl = document.getElementById('status-symbols');
            var sep1 = document.getElementById('status-sep1');
            var sep2 = document.getElementById('status-sep2');
            var sep3 = document.getElementById('status-sep3');

            if (status.connected) {
                dot.classList.add('connected');
                text.textContent = '已连接';
                portEl.textContent = status.port || '';
                baudEl.textContent = status.baud ? (status.baud + ' baud') : '';
                symbolsEl.textContent = status.symbols ? ('符号表: ' + status.symbols) : '';
                sep1.style.display = status.port ? '' : 'none';
                sep2.style.display = status.baud ? '' : 'none';
                sep3.style.display = status.symbols ? '' : 'none';
            } else {
                dot.classList.remove('connected');
                text.textContent = '未连接';
                portEl.textContent = '';
                baudEl.textContent = '';
                symbolsEl.textContent = status.symbols ? ('符号表: ' + status.symbols) : '';
                sep1.style.display = 'none';
                sep2.style.display = 'none';
                sep3.style.display = status.symbols ? '' : 'none';
            }

            // Update disconnect button visibility in connect dialog
            var disconnectBtn = document.getElementById('ramgs-disconnect-btn');
            if (disconnectBtn) disconnectBtn.style.display = status.connected ? '' : 'none';
        });
    }

    // ── Generate Symbols Dialog ──
    function showCreateDialog() {
        document.getElementById('ramgs-elf-path').value = '';
        document.getElementById('ramgs-output-dir').value = '';
        document.getElementById('ramgs-create-overlay').classList.add('open');
    }

    function closeCreateDialog() {
        document.getElementById('ramgs-create-overlay').classList.remove('open');
    }

    function pickElfFile() {
        if (!window.electronAPI) return;
        window.electronAPI.ramgsSelectElf().then(function(result) {
            if (result.canceled) return;
            document.getElementById('ramgs-elf-path').value = result.filePath;
        });
    }

    function pickOutputDir() {
        if (!window.electronAPI) return;
        window.electronAPI.ramgsSelectOutputDir().then(function(result) {
            if (result.canceled) return;
            document.getElementById('ramgs-output-dir').value = result.dirPath;
        });
    }

    function doCreateSymbols() {
        var elfPath = document.getElementById('ramgs-elf-path').value;
        var outputDir = document.getElementById('ramgs-output-dir').value;
        if (!elfPath) { alert('请选择 ELF 文件'); return; }
        if (!outputDir) { alert('请选择输出目录'); return; }

        closeCreateDialog();
        showTerminal();
        if (term) term.write('\x1b[90m--- ramgs create: generating symbols ---\x1b[0m\r\n');

        window.electronAPI.ramgsCreate(elfPath, outputDir).then(function(result) {
            if (result.exitCode === 0) {
                if (term) term.write('\x1b[32m--- symbols generated successfully ---\x1b[0m\r\n');
            } else {
                if (term) term.write('\x1b[31m--- symbol generation failed (exit code: ' + result.exitCode + ') ---\x1b[0m\r\n');
            }
            refreshRamgsStatus();
        });
    }

    // ── Load Symbols Dialog ──
    function showLoadDialog() {
        document.getElementById('ramgs-symbols-path').value = '';
        document.getElementById('ramgs-load-overlay').classList.add('open');
    }

    function closeLoadDialog() {
        document.getElementById('ramgs-load-overlay').classList.remove('open');
    }

    function pickSymbolsFile() {
        if (!window.electronAPI) return;
        window.electronAPI.ramgsSelectSymbols().then(function(result) {
            if (result.canceled) return;
            document.getElementById('ramgs-symbols-path').value = result.filePath;
        });
    }

    function doLoadSymbols() {
        var symbolsPath = document.getElementById('ramgs-symbols-path').value;
        if (!symbolsPath) { alert('请选择符号表文件'); return; }

        closeLoadDialog();
        showTerminal();
        if (term) term.write('\x1b[90m--- ramgs load: loading symbols ---\x1b[0m\r\n');

        window.electronAPI.ramgsLoad(symbolsPath).then(function(result) {
            if (result.exitCode === 0) {
                if (term) term.write('\x1b[32m--- symbols loaded successfully ---\x1b[0m\r\n');
            } else {
                if (term) term.write('\x1b[31m--- symbol loading failed (exit code: ' + result.exitCode + ') ---\x1b[0m\r\n');
            }
            refreshRamgsStatus();
        });
    }

    // ── Connect Device Dialog ──
    function showConnectDialog() {
        document.getElementById('ramgs-connect-overlay').classList.add('open');
        refreshPorts();
        refreshRamgsStatus();
    }

    function closeConnectDialog() {
        document.getElementById('ramgs-connect-overlay').classList.remove('open');
    }

    function refreshPorts() {
        if (!window.electronAPI || !window.electronAPI.ramgsPorts) return;
        var selectEl = document.getElementById('ramgs-port');
        selectEl.innerHTML = '<option value="">加载中...</option>';
        window.electronAPI.ramgsPorts().then(function(result) {
            selectEl.innerHTML = '';
            if (!result.success || result.ports.length === 0) {
                selectEl.innerHTML = '<option value="">未找到端口</option>';
                return;
            }
            result.ports.forEach(function(p) {
                var opt = document.createElement('option');
                opt.value = p.name;
                opt.textContent = p.name + (p.description ? ' - ' + p.description : '');
                selectEl.appendChild(opt);
            });
        });
    }

    function doConnect() {
        var port = document.getElementById('ramgs-port').value;
        var baud = document.getElementById('ramgs-baud').value;
        var endian = document.getElementById('ramgs-endian').value;
        if (!port) { alert('请选择端口'); return; }

        closeConnectDialog();
        showTerminal();
        if (term) term.write('\x1b[90m--- ramgs open: connecting to ' + port + ' @ ' + baud + ' ---\x1b[0m\r\n');

        window.electronAPI.ramgsOpen(port, baud, endian).then(function(result) {
            if (result.exitCode === 0) {
                if (term) term.write('\x1b[32m--- device connected ---\x1b[0m\r\n');
            } else {
                if (term) term.write('\x1b[31m--- connection failed (exit code: ' + result.exitCode + ') ---\x1b[0m\r\n');
            }
            refreshRamgsStatus();
        });
    }

    function doDisconnect() {
        closeConnectDialog();
        showTerminal();
        if (term) term.write('\x1b[90m--- ramgs close: disconnecting ---\x1b[0m\r\n');

        window.electronAPI.ramgsClose().then(function(result) {
            if (result.exitCode === 0) {
                if (term) term.write('\x1b[32m--- device disconnected ---\x1b[0m\r\n');
            } else {
                if (term) term.write('\x1b[31m--- disconnect failed (exit code: ' + result.exitCode + ') ---\x1b[0m\r\n');
            }
            refreshRamgsStatus();
        });
    }

    function openMcuLibDirectory() {
        if (!window.electronAPI || !window.electronAPI.ramgsOpenMcuLib) return;

        window.electronAPI.ramgsOpenMcuLib().then(function(result) {
            if (!result.success) {
                alert('无法打开MCU库目录: ' + (result.error || '未知错误'));
            }
        });
    }

    function showIntegrationGuide() {
        if (!window.electronAPI || !window.electronAPI.ramgsShowIntegrationGuide) return;

        window.electronAPI.ramgsShowIntegrationGuide().then(function(result) {
            if (result.success) {
                // 重新编排章节序号（从 9.x 改为 1.x）
                var content = result.content;
                content = content.replace(/^## 9\. MCU库集成/m, '# MCU库集成指南');
                content = content.replace(/^### 9\.(\d+)/gm, '## $1.');
                content = content.replace(/^#### /gm, '### ');

                // 创建一个模态窗口显示帮助内容
                var overlay = document.createElement('div');
                overlay.className = 'ramgs-overlay open';
                overlay.style.zIndex = '10000';
                overlay.onclick = function(e) {
                    if (e.target === overlay) overlay.remove();
                };

                var dialog = document.createElement('div');
                dialog.className = 'ramgs-dialog';
                dialog.style.maxWidth = '900px';
                dialog.style.maxHeight = '80vh';
                dialog.style.overflow = 'hidden';
                dialog.style.display = 'flex';
                dialog.style.flexDirection = 'column';

                var header = document.createElement('div');
                header.style.cssText = 'display: flex; justify-content: space-between; align-items: center; padding-bottom: 12px; border-bottom: 1px solid #30363d; flex-shrink: 0;';
                header.innerHTML = '<h3 style="margin: 0; color: #e6edf3;">MCU库集成指南</h3><button onclick="this.closest(\'.ramgs-overlay\').remove()" style="background: transparent; border: none; color: #8b949e; font-size: 24px; cursor: pointer; padding: 0; width: 32px; height: 32px;">&times;</button>';

                var contentDiv = document.createElement('div');
                contentDiv.style.cssText = 'color: #c9d1d9; line-height: 1.6; overflow-y: auto; flex: 1; margin-top: 16px; padding-right: 8px;';
                contentDiv.className = 'markdown-body';

                // 渲染 markdown
                contentDiv.innerHTML = marked.parse(content);
                applyMarkdownStyles(contentDiv);

                dialog.appendChild(header);
                dialog.appendChild(contentDiv);
                overlay.appendChild(dialog);
                document.body.appendChild(overlay);
            } else {
                alert('无法加载帮助文档: ' + (result.error || '未知错误'));
            }
        });
    }

    function applyMarkdownStyles(container) {
        // 应用 GitHub 风格的 markdown 样式
        var style = document.createElement('style');
        style.textContent = `
            .markdown-body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; }
            .markdown-body h1 { font-size: 24px; font-weight: 600; margin-top: 24px; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid #30363d; color: #e6edf3; }
            .markdown-body h2 { font-size: 20px; font-weight: 600; margin-top: 24px; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid #30363d; color: #e6edf3; }
            .markdown-body h3 { font-size: 16px; font-weight: 600; margin-top: 24px; margin-bottom: 16px; color: #e6edf3; }
            .markdown-body h4 { font-size: 14px; font-weight: 600; margin-top: 16px; margin-bottom: 8px; color: #e6edf3; }
            .markdown-body p { margin-top: 0; margin-bottom: 16px; }
            .markdown-body code { background: #161b22; padding: 2px 6px; border-radius: 3px; font-family: 'Consolas', 'Monaco', monospace; font-size: 13px; color: #f0883e; }
            .markdown-body pre { background: #161b22; padding: 16px; border-radius: 6px; overflow-x: auto; margin-bottom: 16px; border: 1px solid #30363d; }
            .markdown-body pre code { background: transparent; padding: 0; color: #c9d1d9; }
            .markdown-body table { border-collapse: collapse; width: 100%; margin-bottom: 16px; }
            .markdown-body table th, .markdown-body table td { border: 1px solid #30363d; padding: 8px 12px; text-align: left; }
            .markdown-body table th { background: #161b22; font-weight: 600; }
            .markdown-body ul, .markdown-body ol { margin-bottom: 16px; padding-left: 24px; }
            .markdown-body li { margin-bottom: 4px; }
            .markdown-body blockquote { border-left: 3px solid #30363d; padding-left: 16px; margin-left: 0; color: #8b949e; }
            .markdown-body a { color: #58a6ff; text-decoration: none; }
            .markdown-body a:hover { text-decoration: underline; }
        `;
        if (!document.getElementById('markdown-styles')) {
            style.id = 'markdown-styles';
            document.head.appendChild(style);
        }
    }

    function closeRamgsOverlay(e, id) {
        if (e.target === document.getElementById(id)) {
            document.getElementById(id).classList.remove('open');
        }
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            document.querySelectorAll('.ramgs-overlay.open').forEach(function(overlay) {
                overlay.classList.remove('open');
            });
        }
    });
</script>
